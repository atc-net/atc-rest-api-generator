openapi: 3.0.0
paths:
  '/items/{id}':
    get:
      summary: Get item by id
      description: Get item by id
      operationId: getItemById
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
      security:
        - {}
        - oAuth2Sample:
          - .default
        - x-atc-azure-ad-application-roles:
          - api.execute.read
          - api.execute.write
    parameters:
      - name: id
        in: path
        description: Id of the item
        required: true
        schema:
          type: string
          format: uuid

components:
  securitySchemes:
    oAuth2Sample:
      x-atc-azure-ad-application-roles:
        api.execute.all: 
          description: Access to all operations
          name: everything
        api.execute.read: 
          description: Access to smart charging operations.
          name: read

      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: 'https://login.microsoftonline.com/39e165d1-ec01-4e3b-9691-3c8268c2e60e/oauth2/v2.0/token'
          refreshUrl: ''
          scopes:
            .default 
      description: OAuth2 using client id + client secret
  schemas:
    Item:
      title: Item
      description: A single item.
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        name:
          type: string
        number:
          type: number